name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build binary for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: sr-x86_64-unknown-linux-gnu.tar.gz
          # Linux aarch64 (cross-compile)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: sr-aarch64-unknown-linux-gnu.tar.gz
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: sr-x86_64-apple-darwin.tar.gz
          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: sr-aarch64-apple-darwin.tar.gz
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: sr-x86_64-pc-windows-msvc.zip
          # Windows aarch64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: sr-aarch64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross tools (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/bin
          cp target/${{ matrix.target }}/release/sr package/bin/
          cp README.md LICENSE NOTICE package/ 2>/dev/null || true
          tar czf ${{ matrix.archive }} -C package .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package/bin -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sr.exe" "package/bin/"
          Copy-Item "README.md" "package/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "package/" -ErrorAction SilentlyContinue
          Copy-Item "NOTICE" "package/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "package/*" -DestinationPath "${{ matrix.archive }}"

      - name: Compute SHA256
        if: runner.os != 'Windows'
        run: sha256sum ${{ matrix.archive }} | tee ${{ matrix.archive }}.sha256

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
          fail_on_unmatched_files: true